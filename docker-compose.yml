services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    hostname: zookeeper

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc -w 3 localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    hostname: kafka

    depends_on:
      - zookeeper

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  flink-jobmanager:
    image: apache/flink:1.16.1
    hostname: jobmanager

    command: jobmanager

    environment:
      FLINK_PROPERTIES: |-
        jobmanager.rpc.address: jobmanager
        rest.bind-address: 0.0.0.0

    ports:
      - "8081:8081"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 10s
      timeout: 5s
      retries: 12

  flink-taskmanager:
    image: apache/flink:1.16.1
    hostname: taskmanager

    depends_on:
      flink-jobmanager:
        condition: service_healthy

    command: taskmanager

    environment:
      FLINK_PROPERTIES: |-
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2

  flink-job:
    build:
      context: .
      dockerfile: ./flink-job/Dockerfile

    depends_on:
      flink-jobmanager:
        condition: service_healthy

      kafka:
        condition: service_healthy

    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - USER_EVENTS_TOPIC=user-events
      - CONTENT_METADATA_TOPIC=content-metadata
      - FEATURE_STORE_TOPIC=feature-store
      - WATERMARK_DELAY_SECONDS=30

    volumes:
      - ./flink-job:/opt/flink-job

    command: >
      /opt/flink/bin/flink run
      -m jobmanager:8081
      -py /opt/flink-job/main.py

  producer:
    build: ./producer

    depends_on:
      kafka:
        condition: service_healthy

    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - USER_EVENTS_TOPIC=user-events
      - CONTENT_METADATA_TOPIC=content-metadata
      - LATE_EVENT_PERCENTAGE=5

  dashboard:
    build: ./dashboard

    depends_on:
      kafka:
        condition: service_healthy

    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - FEATURE_STORE_TOPIC=feature-store
      - DASHBOARD_PORT=5000

    ports:
      - "5000:5000"